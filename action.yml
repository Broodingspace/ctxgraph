name: "ctxgraph impact report"
description: "Build a structural impact report for Python pull requests using ctxgraph."
inputs:
  repo-path:
    description: "Repository path to analyze."
    required: false
    default: "."
  package-name:
    description: "Optional top-level package name."
    required: false
  base-ref:
    description: "Base git ref or SHA for the diff."
    required: true
  head-ref:
    description: "Head git ref or SHA for the diff."
    required: true
  depth:
    description: "Blast radius depth."
    required: false
    default: "2"
  max-callers:
    description: "Maximum high-risk callers per changed symbol."
    required: false
    default: "5"
  comment-mode:
    description: "Whether to post a PR comment."
    required: false
    default: "pr"
  markdown-out:
    description: "Optional path to write the generated markdown report."
    required: false
    default: ""
  low-max:
    description: "Maximum blast radius counted as low severity."
    required: false
    default: "10"
  medium-max:
    description: "Maximum blast radius counted as medium severity."
    required: false
    default: "25"
  run-tests:
    description: "Whether to run the repository test suite as part of the action."
    required: false
    default: "false"
  test-command:
    description: "Command used to run tests when run-tests=true."
    required: false
    default: "pytest"
  fail-on-test-failure:
    description: "Whether the action should fail if the test command fails."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install ctxgraph
      shell: bash
      run: pip install "${{ github.action_path }}"
    - name: Install repository test dependencies
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if ! pip install -e "${{ inputs.repo-path }}[dev]"; then
          pip install -e "${{ inputs.repo-path }}"
          pip install pytest
        fi
    - name: Run repository tests
      if: ${{ inputs.run-tests == 'true' }}
      id: run_tests
      shell: bash
      env:
        TEST_COMMAND: ${{ inputs.test-command }}
      run: |
        echo "::group::ctxgraph: run tests"
        set +e
        bash -lc "$TEST_COMMAND"
        status=$?
        set -e
        if [ $status -eq 0 ]; then
          echo "Test status: passed"
          echo "test_status=passed" >> "$GITHUB_OUTPUT"
        else
          echo "Test status: failed (exit $status)"
          echo "test_status=failed" >> "$GITHUB_OUTPUT"
          echo "test_exit_code=$status" >> "$GITHUB_OUTPUT"
        fi
        echo "## ctxgraph test run" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- Command: \`${{ inputs.test-command }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- Status: **$( [ $status -eq 0 ] && echo passed || echo failed )**" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "::endgroup::"
        exit 0
    - name: Run ctxgraph impact analysis
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_PACKAGE_NAME: ${{ inputs.package-name }}
        INPUT_MARKDOWN_OUT: ${{ inputs.markdown-out }}
      run: |
        cmd=(
          python "${{ github.action_path }}/scripts/github_action.py"
          --repo-path "${{ inputs.repo-path }}"
          --base-ref "${{ inputs.base-ref }}"
          --head-ref "${{ inputs.head-ref }}"
          --depth "${{ inputs.depth }}"
          --max-callers "${{ inputs.max-callers }}"
          --comment-mode "${{ inputs.comment-mode }}"
          --low-max "${{ inputs.low-max }}"
          --medium-max "${{ inputs.medium-max }}"
        )
        if [ -n "${INPUT_PACKAGE_NAME}" ]; then
          cmd+=(--package-name "${INPUT_PACKAGE_NAME}")
        fi
        if [ -n "${INPUT_MARKDOWN_OUT}" ]; then
          cmd+=(--markdown-out "${INPUT_MARKDOWN_OUT}")
        fi
        "${cmd[@]}"
    - name: Enforce test success
      if: ${{ inputs.run-tests == 'true' && inputs.fail-on-test-failure == 'true' && steps.run_tests.outputs.test_status == 'failed' }}
      shell: bash
      run: |
        echo "Repository tests failed during ctxgraph action."
        exit 1
